<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad-Venture: Snake & Ladder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .game-font { font-family: 'Fredoka One', cursive; }

        #board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: min(90vw, 600px);
            height: min(90vw, 600px);
            background: #16213e;
            border: 4px solid #4ecca3;
            border-radius: 8px;
            position: relative;
        }

        .cell {
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            position: relative;
            font-weight: bold;
        }

        .cell:nth-child(even) { background: rgba(255, 255, 255, 0.05); }

        .player-token {
            width: 30px;
            height: 30px;
            background: #ff4d4d;
            border: 3px solid white;
            border-radius: 50%;
            position: absolute;
            transition: all 0.5s ease-in-out;
            z-index: 50;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.8);
        }

        .snake { color: #ff4d6d; font-size: 1.5rem; }
        .ladder { color: #4ecca3; font-size: 1.5rem; }

        .bot-bubble {
            position: relative;
            background: #ffffff;
            color: #333;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .bot-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 20px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #fff transparent;
        }

        @keyframes dice-roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .rolling { animation: dice-roll 0.3s infinite; }

        #ad-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .ad-card {
            background: white;
            color: #333;
            padding: 24px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 8px solid #facc15;
            box-shadow: 0 0 30px rgba(250, 204, 21, 0.5);
        }
    </style>
</head>
<body>

<div id="ad-modal">
    <div class="ad-card">
        <div id="ad-content">
            <h2 id="ad-title" class="game-font text-2xl mb-2 text-blue-600">Flash Sale!</h2>
            <div id="ad-image" class="text-6xl my-4">⚡</div>
            <p id="ad-body" class="text-lg mb-4 italic">"Hurry up! Don't miss out on this amazing deal!"</p>
            <div class="bg-blue-100 p-3 rounded-lg mb-4 text-sm font-bold text-blue-800">
                Category: Advertisement Analysis
            </div>
            <button onclick="closeAd()" class="bg-green-500 text-white font-bold py-2 px-8 rounded-full hover:bg-green-600 transition-colors">
                Got it! Let's go!
            </button>
        </div>
    </div>
</div>

<div class="flex flex-col md:flex-row items-center gap-8 p-4">
    <div class="relative">
        <div id="board"></div>
        <div id="player" class="player-token"></div>
    </div>

    <div class="flex flex-col items-center w-64">
        <div id="ad-bot-container" class="mb-6">
            <div id="speech-bubble" class="bot-bubble text-sm font-bold">
                Hello there! Let's master Advertisements! Roll the dice to start!
            </div>
            <div class="flex justify-end">
                <div class="w-20 h-20 bg-blue-400 rounded-full flex items-center justify-center border-4 border-white shadow-xl animate-bounce">
                    <span class="text-4xl">🤖</span>
                </div>
            </div>
        </div>

        <div class="bg-white/10 p-6 rounded-2xl border border-white/20 text-center w-full">
            <div id="dice" class="text-6xl mb-4 bg-white text-blue-900 w-20 h-20 flex items-center justify-center mx-auto rounded-xl shadow-inner cursor-pointer select-none">
                🎲
            </div>
            <button id="roll-btn" onclick="rollDice()" class="bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-bold py-3 px-8 rounded-full transition-transform active:scale-95 shadow-lg w-full">
                ROLL DICE!
            </button>
            <div class="mt-4 text-sm opacity-80">
                Square: <span id="current-pos" class="font-bold text-yellow-400">1</span>
            </div>
        </div>
    </div>
</div>

<script>
    const apiKey = ""; 
    const boardEl = document.getElementById('board');
    const playerEl = document.getElementById('player');
    const diceEl = document.getElementById('dice');
    const speechBubble = document.getElementById('speech-bubble');
    const currentPosEl = document.getElementById('current-pos');
    const rollBtn = document.getElementById('roll-btn');
    const adModal = document.getElementById('ad-modal');
    const adTitle = document.getElementById('ad-title');
    const adImage = document.getElementById('ad-image');
    const adBody = document.getElementById('ad-body');

    let currentSquare = 1;
    let isRolling = false;

    const ladders = { 3: 22, 5: 8, 11: 26, 20: 29, 27: 56, 35: 44, 48: 72, 60: 82, 75: 94 };
    const snakes = { 17: 4, 19: 7, 31: 10, 45: 25, 59: 38, 65: 50, 88: 66, 97: 78, 99: 5 };

    const adData = {
        3: { title: "Great Headline!", img: "📢", body: "Your headline is so catchy! Everyone is looking at your ad! Climb up to square 22!" },
        5: { title: "Stunning Visual!", img: "📸", body: "What a beautiful picture! Your product looks amazing. Go up to square 8!" },
        11: { title: "Clever Slogan!", img: "✍️", body: "Your slogan is very memorable! People can't stop thinking about it. Jump to 26!" },
        17: { title: "Bad Layout!", img: "🗑️", body: "Oh no! Your layout is too messy. People can't read the info. Slide down to 4." },
        19: { title: "Missing Contact!", img: "📵", body: "You forgot the phone number! How can customers buy it? Go back to 7." },
        31: { title: "Misleading Info!", img: "🤥", body: "Honesty is the best policy. Your ad is confusing customers. Return to 10." },
        48: { title: "Perfect CTA!", img: "🛒", body: "Your 'Buy Now' button is so clear! Sales are booming! Zoom to 72!" },
        99: { title: "Expired Promo!", img: "⏰", body: "This promotion ended last month! Oops! Back to square 5." }
    };

    function initBoard() {
        for (let i = 100; i >= 1; i--) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `square-${i}`;
            cell.innerHTML = `<span>${i}</span>`;
            if (ladders[i]) cell.innerHTML += `<span class="ladder">🪜</span>`;
            if (snakes[i]) cell.innerHTML += `<span class="snake">🐍</span>`;
            boardEl.appendChild(cell);
        }
        updatePlayerPosition();
    }

    async function speak(text) {
        try {
            // Updated to ensure English robot voice instructions
            const payload = {
                contents: [{ parts: [{ text: `Say this exactly in a cheerful, funny, high-pitched English robot voice: ${text}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                },
                model: "gemini-2.5-flash-preview-tts"
            };
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            const pcmData = result.candidates[0].content.parts[0].inlineData.data;
            playAudio(pcmData);
            speechBubble.innerText = text;
        } catch (e) {
            speechBubble.innerText = text;
        }
    }

    function playAudio(base64Data) {
        const binaryString = atob(base64Data);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
        const wavHeader = createWavHeader(len, 24000);
        const blob = new Blob([wavHeader, bytes], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.play();
    }

    function createWavHeader(dataLength, sampleRate) {
        const buffer = new ArrayBuffer(44);
        const view = new DataView(buffer);
        view.setUint32(0, 0x46464952, true); view.setUint32(4, 36 + dataLength, true);
        view.setUint32(8, 0x45564157, true); view.setUint32(12, 0x20746d66, true);
        view.setUint32(16, 16, true); view.setUint16(20, 1, true);
        view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true);
        view.setUint16(34, 16, true); view.setUint32(36, 0x61746164, true);
        view.setUint32(40, dataLength, true);
        return buffer;
    }

    function rollDice() {
        if (isRolling) return;
        isRolling = true;
        diceEl.classList.add('rolling');
        rollBtn.disabled = true;
        setTimeout(() => {
            const roll = Math.floor(Math.random() * 6) + 1;
            diceEl.classList.remove('rolling');
            diceEl.innerText = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"][roll-1];
            movePlayer(roll);
            isRolling = false;
            rollBtn.disabled = false;
        }, 600);
    }

    function movePlayer(steps) {
        let target = currentSquare + steps;
        if (target > 100) target = 100;
        currentSquare = target;
        updatePlayerPosition();
        setTimeout(checkSquare, 600);
    }

    function showAd(data) {
        adTitle.innerText = data.title;
        adImage.innerText = data.img;
        adBody.innerText = data.body;
        adModal.style.display = 'flex';
    }

    function closeAd() {
        adModal.style.display = 'none';
    }

    function checkSquare() {
        if (adData[currentSquare]) {
            const info = adData[currentSquare];
            showAd(info);
            speak(`${info.title}! ${info.body}`);
            if (ladders[currentSquare]) currentSquare = ladders[currentSquare];
            else if (snakes[currentSquare]) currentSquare = snakes[currentSquare];
            setTimeout(updatePlayerPosition, 1000);
        } else {
            speak(`You are now on square ${currentSquare}.`);
        }

        if (currentSquare === 100) {
            speak("Congratulations! You are the advertising master!");
            alert("VICTORY! You won the game!");
            currentSquare = 1;
            updatePlayerPosition();
        }
    }

    function updatePlayerPosition() {
        const targetCell = document.getElementById(`square-${currentSquare}`);
        const rect = targetCell.getBoundingClientRect();
        const boardRect = boardEl.getBoundingClientRect();
        playerEl.style.left = (rect.left - boardRect.left + (rect.width / 2) - 15) + 'px';
        playerEl.style.top = (rect.top - boardRect.top + (rect.height / 2) - 15) + 'px';
        currentPosEl.innerText = currentSquare;
    }

    window.onload = initBoard;
</script>
</body>
</html>
